name: CI

on:
  push:
    branches: [master, main, "claude/**", "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install --quiet "ruff>=0.4.0"
      - run: ruff check . --output-format=github

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python -m compileall . -q

  import-check:
    name: Import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install deps
        run: |
          cd ..
          pip install --quiet -r neuro_agent/requirements.txt
      - name: Check imports
        run: |
          cd ..
          python -c "
          import neuro_agent
          import neuro_agent.config
          import neuro_agent.api.app
          import neuro_agent.integrations
          print('All imports OK')
          "

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, syntax, import-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install deps
        run: |
          cd ..
          pip install --quiet -r neuro_agent/requirements.txt pytest pytest-asyncio
      - name: Run tests
        run: |
          cd ..
          pytest neuro_agent/tests/ -v --tb=short
        continue-on-error: true

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, syntax, import-check]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: neuro-agent:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
